services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  
  cache:
    image: redis:7
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --maxmemory
      - 2mb # Memoria cache
      - --maxmemory-policy
      - allkeys-lru # Politica de remocion: allkeys-lru - allkeys-lfu

  app:
    build: .
    container_name: tarea2_app
    depends_on:
      - cache
    volumes:
      - ./app:/app
      - ./data:/data

    environment:
      
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092 
      #REDIS_HOST: cache
      #TRAFFIC_INTERVAL: 0.1 # Tiempo entre peticiones